<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Access Restricted</title>
  <style>
    :root {
      --bg-root: #000000;
      --surface-glass: rgba(28, 28, 30, 0.65);
      --border-subtle: rgba(255, 255, 255, 0.1);
      --text-primary: #ffffff;
      --text-secondary: rgba(235, 235, 245, 0.6);
      --accent-red: #FF453A;
      --radius-lg: 16px;
      --radius-md: 8px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: var(--bg-root);
      color: var(--text-primary);
      text-align: center;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      width: 100%;
      max-width: 420px;
      padding: 48px 32px;
      background: var(--surface-glass);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .icon-container {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(255, 69, 58, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 8px;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text-primary);
    }

    p {
      font-size: 14px;
      line-height: 1.5;
      color: var(--text-secondary);
      margin-bottom: 16px;
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-primary);
      border: 1px solid var(--border-subtle);
      padding: 10px 20px;
      border-radius: var(--radius-md);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-ghost:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.25);
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="icon-container">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--accent-red)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
        <line x1="12" y1="8" x2="12" y2="12"></line>
        <line x1="12" y1="16" x2="12.01" y2="16"></line>
      </svg>
    </div>
    
    <h1 data-testid="blocked-message">Page Blocked</h1>
    
    <p>This website has been restricted by Productivity Suite to maintain your focus session.</p>

    <button id="close-btn" class="btn-ghost">Close Tab</button>
  </div>

  <script>
    document.getElementById('close-btn').addEventListener('click', () => {
      window.close();
    });
  </script>

</body>
</html>
