<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productivity Suite - Preferences</title>
  <style>
    :root {
      /* Apple System Dark Mode Palette */
      --bg-root: #000000;
      --surface-glass: rgba(28, 28, 30, 0.65);
      --surface-glass-elevated: rgba(44, 44, 46, 0.65);
      --surface-solid: #1c1c1e;
      --border-subtle: rgba(255, 255, 255, 0.1);
      --border-active: rgba(255, 255, 255, 0.25);
      
      --text-primary: #ffffff;
      --text-secondary: rgba(235, 235, 245, 0.6);
      
      --accent-blue: #0A84FF;
      --accent-blue-hover: #0070DF;
      --accent-red: #FF453A;
      --accent-red-hover: rgba(255, 69, 58, 0.15);
      
      --radius-sm: 6px;
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", sans-serif;
      background: var(--bg-root);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 8px;
    }

    .header-icon {
      width: 40px;
      height: 40px;
      background: var(--accent-blue);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .header-title h1 {
      font-size: 24px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .header-title p {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    /* Settings Cards */
    .settings-card {
      background: var(--surface-glass);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: 24px;
    }

    .section-title {
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-secondary);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Inputs & Buttons */
    .input-row {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    input[type="text"] {
      flex: 1;
      background: var(--surface-glass-elevated);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 12px 16px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: var(--accent-blue);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 20px;
      border: none;
      border-radius: var(--radius-md);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .btn-primary {
      background: var(--accent-blue);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--accent-blue-hover);
    }

    .btn-ghost {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-primary);
      border: 1px solid var(--border-subtle);
    }

    .btn-ghost:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: var(--border-active);
    }

    .btn-danger-ghost {
      background: transparent;
      color: var(--text-secondary);
      padding: 8px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-danger-ghost:hover {
      background: var(--accent-red-hover);
      color: var(--accent-red);
    }

    /* List Items */
    #blocked-sites-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .site-item {
      background: var(--surface-glass-elevated);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
    }

    .empty-state {
      text-align: center;
      padding: 24px 0;
      color: var(--text-secondary);
      font-size: 13px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      border: 1px dashed var(--border-subtle);
      border-radius: var(--radius-md);
    }

    /* Toast Notification */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translate(-50%, 20px);
      background: var(--surface-glass-elevated);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border-subtle);
      border-radius: 100px;
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      box-shadow: 0 8px 24px rgba(0,0,0,0.6);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      pointer-events: none;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #toast.show {
      transform: translate(-50%, 0);
      opacity: 1;
    }

    /* SVG Utilities */
    .icon-sm { width: 16px; height: 16px; }
    .icon-md { width: 24px; height: 24px; }
  </style>
</head>
<body>

  <div class="container">
    
    <div class="header">
      <div class="header-icon">
        <svg class="icon-md" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
      </div>
      <div class="header-title">
        <h1>Preferences</h1>
        <p>Manage your restrictions and data</p>
      </div>
    </div>

    <div class="settings-card">
      <div class="section-title">
        <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
        Website Blocker
      </div>
      
      <div class="input-row">
        <input type="text" id="block-hostname-input" data-testid="block-hostname-input" placeholder="e.g., facebook.com">
        <button id="add-block-btn" class="btn btn-primary" data-testid="add-block-btn">Add Site</button>
      </div>

      <div id="blocked-sites-list" data-testid="blocked-sites-list">
        </div>
    </div>

    <div class="settings-card">
      <div class="section-title">
        <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
        Data Management
      </div>
      <p style="color: var(--text-secondary); font-size: 13px; margin-bottom: 16px;">Export all your saved workspaces, notes, and blocked sites to a local JSON file for backup.</p>
      
      <button id="export-data-btn" class="btn btn-ghost" data-testid="export-data-btn">
        Export All Data
      </button>
    </div>

  </div>

  <div id="toast">
    <span id="toast-icon"></span>
    <span id="toast-msg">Success</span>
  </div>

  <script src="options.js"></script>

</body>
</html>
